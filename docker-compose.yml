# Local/staging stack. For production, use managed Postgres and put the
# whole thing behind a TLS-terminating reverse proxy.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kyc_automation_db
      POSTGRES_USER: kyc
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - kyc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyc -d kyc_automation_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://kyc:${DB_PASSWORD}@db:5432/kyc_automation_db
      PAN_HASH_SECRET: ${PAN_HASH_SECRET:?required}
      KYC_LINK_SECRET: ${KYC_LINK_SECRET:?required}
      JWT_SECRET: ${JWT_SECRET:?required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?required}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?required}
      KYC_BUYER_BASE_URL: ${KYC_BUYER_BASE_URL:-http://localhost:8080}
      KYC_API_BASE_URL: ${KYC_API_BASE_URL:-http://localhost:5000}
      CORS_ORIGIN: ${KYC_BUYER_BASE_URL:-http://localhost:8080}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@2factor.in}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@2factor.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?required}
    ports:
      - "5000:5000"
    volumes:
      - kyc_uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${KYC_API_BASE_URL:-http://localhost:5000}
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  kyc_pgdata:
  kyc_uploads:
